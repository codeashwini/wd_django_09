
{% extends "base.html" %}
{% block 'title' %}
    Change Password
{% endblock  %}

{% block 'body' %}
<h2>Change Password</h2>
<div class="container">
<div class="card">
<form method="post" class="form-control">
    {% csrf_token %}

    <label class="form-label"> Current Password </label><br>
    <input type="password" name="current_password" required class="form-control"><br><br>

    <label class="form-label">New Password</label><br>
    <input type="password" name="new_password" required class="form-control"><br><br>

    <label class="form-label">Confirm Password</label><br>
    <input type="password" name="confirm_password"  required class="form-control"><br><br>

    <button type="submit" class="btn-success btn">Change Password</button>

</form>
</div>
</div>

{% if error %}
    <p style="color:red"> {{error}}</p>
{% endif %}
{% if success %}
    <p style="color:green"> {{success}}</p>
{% endif %}
<br>
<a href="/profile/">Back to Profile</a>

{% endblock  %}
