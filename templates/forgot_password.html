<h2>Enter Your Email Address : </h1>

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" id="email" placeholder="Enter your email" required>
        <button type="submit">Send Rest Link</button>
    </form>

    {% if msg %}
        <p style="color:green">{{msg}}</p>
    {% endif %}

    {% if error %}
            <p style="color:red">{{error}}</p>
    {% endif %}
